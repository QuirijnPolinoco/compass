name: Release

# Builds the single self-contained binary for each platform (FR-2/A2). The linux-musl
# and aarch64 targets need a real C toolchain because the tree-sitter grammars are C —
# this is why the build is a per-target matrix, not a from-one-host cross-compile.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# The release step creates/updates a GitHub Release, which needs write access to
# repository contents. Without this, GITHUB_TOKEN is often read-only and the upload 403s.
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install musl C toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        env:
          # Compile the tree-sitter C sources with the musl-targeting compiler.
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release -p compass-cli --target ${{ matrix.target }}

      - name: Package + checksum (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf "compass-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" compass
          shasum -a 256 "compass-${{ matrix.target }}.tar.gz" | awk '{print $1}' > "compass-${{ matrix.target }}.tar.gz.sha256"

      - name: Package + checksum (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/compass.exe" -DestinationPath "compass-${{ matrix.target }}.zip"
          (Get-FileHash "compass-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() | Out-File -NoNewline -Encoding ascii "compass-${{ matrix.target }}.zip.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: compass-${{ matrix.target }}
          path: |
            compass-${{ matrix.target }}.tar.gz
            compass-${{ matrix.target }}.zip
            compass-${{ matrix.target }}.*.sha256
          if-no-files-found: ignore

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Checksums (.sha256) ship alongside each archive so Homebrew/Scoop formulas and
          # manual downloaders can verify integrity.
          files: |
            compass-${{ matrix.target }}.tar.gz
            compass-${{ matrix.target }}.zip
            compass-${{ matrix.target }}.*.sha256
          fail_on_unmatched_files: false
